<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CashX — Earn While You Sleep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg: #050b18;
  --bg-2: #070f1f;
  --bg-3: #0a1628;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-bright: rgba(255,255,255,0.15);
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --accent: #22d3ee;
  --accent-dark: #06b6d4;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --glass-hover: rgba(255,255,255,0.08);
  --sidebar-w: 260px;
--topbar-h: 60px;
--bottom-nav-h: 68px;
--safe-bottom: env(safe-area-inset-bottom, 0px);
--touch-min: 48px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  --glow: 0 0 40px rgba(99,102,241,0.2);
  --radius: 16px;
  --radius-sm: 8px;
  --radius-lg: 24px;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;-webkit-tap-highlight-color: transparent;}

#app { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: var(--font); }
input, textarea, select { font-family: var(--font); }
img { display: block; }

/* ============================================================
   GLASS COMPONENTS
   ============================================================ */
.glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.glass-card-inner { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
.glass-nav { background: rgba(5,11,24,0.85); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.gradient-text { background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.text-success { color: var(--success) !important; }
.text-danger { color: var(--danger) !important; }
.text-warning { color: var(--warning) !important; }
.text-muted { color: var(--text-3); font-size: 0.8rem; }
.accent { color: var(--accent); }
.text-center { text-align: center; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.875rem; transition: all 0.2s ease; cursor: pointer; white-space: nowrap; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 20px rgba(99,102,241,0.35); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.5); }
.btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(99,102,241,0.3); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.6; transform: none; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border-bright); }
.btn-outline:hover { background: var(--surface-hover); border-color: var(--primary-light); }
.btn-outline-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-outline-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; font-size: 0.75rem; padding: 0.4rem 0.75rem; }
.btn-lg { padding: 0.875rem 1.75rem; font-size: 1rem; }
.btn-xl { padding: 1rem 2rem; font-size: 1.05rem; border-radius: var(--radius-sm); }
.btn-sm { padding: 0.4rem 0.75rem; font-size: 0.75rem; }
.btn-arrow { transition: transform 0.2s; }
.btn:hover .btn-arrow { transform: translateX(4px); }
.w-full { width: 100%; }

/* ============================================================
   FORMS
   ============================================================ */
.form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.form-label { font-size: 0.8rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }
.form-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: var(--text); font-size: 16px; transition: all 0.2s; outline: none; width: 100%; }
.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.form-input::placeholder { color: var(--text-3); }
.form-input[readonly] { cursor: default; }
.form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 1rem; color: var(--text); font-size: 16px; cursor: pointer; }
.form-check { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.form-check input { accent-color: var(--primary); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-full { grid-column: 1 / -1; }
.phone-input-group { display: flex; gap: 0.5rem; align-items: center; }
.phone-prefix { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem; color: var(--text-2); white-space: nowrap; }
.phone-input { flex: 1; }
.otp-input { text-align: center; letter-spacing: 0.5em; font-size: 1.2rem; font-family: var(--mono); }

/* ============================================================
   BADGES
   ============================================================ */
.badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; }
.badge-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
.badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.badge-info { background: rgba(34,211,238,0.15); color: var(--accent); border: 1px solid rgba(34,211,238,0.3); }
.badge-purple { background: rgba(99,102,241,0.15); color: var(--primary-light); border: 1px solid rgba(99,102,241,0.3); }
.count-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 50%; font-size: 0.75rem; font-weight: 700; }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes float { 0%, 100% { transform: translateY(0px) rotate(2deg); } 50% { transform: translateY(-12px) rotate(-1deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes orbPulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } }
.animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
.animate-float { animation: float 6s ease-in-out infinite; }
.hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
.hover-lift:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

/* ============================================================
   SPINNER
   ============================================================ */
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; }

/* ============================================================
   TOAST
   ============================================================ */
#toast-container { position: fixed; bottom: calc(68px + env(safe-area-inset-bottom) + 1rem); left: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 0.5rem; }
@media (min-width: 768px) {
  #toast-container { bottom: auto; top: 1.5rem; right: 1.5rem; left: auto; max-width: 360px; }
}
   .toast { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.25rem; background: #1e293b; border: 1px solid var(--border-bright); border-radius: var(--radius-sm); color: var(--text); font-size: 0.875rem; font-weight: 500; box-shadow: var(--shadow); transform: translateX(120%); transition: transform 0.3s ease; backdrop-filter: blur(20px); }
.toast.show { transform: translateX(0); }
.toast-icon { font-size: 1rem; font-weight: 800; }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-warning { border-left: 3px solid var(--warning); }
.toast-info { border-left: 3px solid var(--accent); }

/* ============================================================
   LANDING PAGE
   ============================================================ */
.landing-page { min-height: 100vh; overflow-x: hidden; }
.landing-nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; }
.nav-brand { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.brand-logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; color: white; }
.brand-logo.small { width: 28px; height: 28px; font-size: 0.9rem; }
.brand-name { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
.nav-links { display: flex; align-items: center; gap: 1.5rem; }
.nav-link { color: var(--text-2); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
.nav-link:hover { color: var(--text); }
.mobile-menu-btn { display: none; font-size: 1.5rem; color: var(--text); background: none; border: none; cursor: pointer; }
.mobile-menu { display: none; flex-direction: column; gap: 1rem; padding: 1.5rem; background: var(--bg-2); border-bottom: 1px solid var(--border); }
.mobile-menu.open { display: flex; }
.mobile-link { color: var(--text-2); font-weight: 500; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
.hero { position: relative; min-height: 90vh; display: flex; align-items: center; padding: 4rem 2rem; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: orbPulse 8s ease-in-out infinite; }
.orb-1 { width: 600px; height: 600px; background: rgba(99,102,241,0.12); top: -20%; left: -10%; }
.orb-2 { width: 400px; height: 400px; background: rgba(34,211,238,0.08); bottom: -10%; right: 5%; animation-delay: 3s; }
.orb-3 { width: 300px; height: 300px; background: rgba(99,102,241,0.06); top: 50%; left: 50%; animation-delay: 6s; }
.orb-4 { width: 500px; height: 500px; background: rgba(99,102,241,0.1); top: -30%; left: 50%; transform: translateX(-50%); }
.grid-lines { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; }
.hero-content { position: relative; z-index: 1; max-width: 650px; }
.hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); border-radius: 100px; padding: 0.4rem 0.85rem; font-size: 0.78rem; font-weight: 600; color: var(--primary-light); margin-bottom: 1.5rem; }
.badge-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
.hero-title { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1.25rem; }
.hero-subtitle { font-size: 1.1rem; color: var(--text-2); line-height: 1.7; margin-bottom: 2rem; max-width: 520px; }
.hero-actions { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 3rem; }
.hero-stat-inline { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-2); }
.pulse-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s ease infinite; }
.hero-stats { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
.hero-stat-value { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
.hero-stat-label { font-size: 0.75rem; color: var(--text-2); margin-top: 0.15rem; }
.stat-divider { width: 1px; height: 40px; background: var(--border); }
.floating-card { position: absolute; right: 8%; top: 50%; transform: translateY(-50%) rotate(2deg); padding: 1.5rem; width: 220px; }
.fc-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
.fc-icon { font-size: 1.2rem; }
.fc-title { font-weight: 700; font-size: 0.85rem; flex: 1; }
.fc-badge { background: rgba(34,197,94,0.2); color: var(--success); border: 1px solid rgba(34,197,94,0.3); border-radius: 4px; font-size: 0.65rem; font-weight: 800; padding: 0.1rem 0.35rem; animation: pulse 2s ease infinite; }
.fc-amount { font-size: 2rem; font-weight: 800; color: var(--success); letter-spacing: -0.02em; }
.fc-user { font-size: 0.75rem; color: var(--text-2); margin-top: 0.4rem; }
.fc-time { font-size: 0.7rem; color: var(--text-3); margin-top: 0.15rem; }
.section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
.section-dark { background: var(--bg-2); max-width: 100%; padding: 5rem 2rem; }
.section-dark > * { max-width: 1200px; margin: 0 auto; }
.section-header { text-align: center; margin-bottom: 3rem; }
.section-tag { display: inline-block; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: var(--primary-light); border-radius: 100px; padding: 0.3rem 0.85rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.section-title { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
.section-sub { color: var(--text-2); font-size: 1rem; max-width: 500px; margin: 0 auto; }
.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
.feature-card { padding: 1.75rem; }
.feature-icon { font-size: 2rem; margin-bottom: 1rem; }
.feature-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
.feature-desc { font-size: 0.875rem; color: var(--text-2); line-height: 1.6; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
.product-card { padding: 2rem; position: relative; overflow: hidden; }
.product-featured { border-color: var(--primary); box-shadow: var(--glow); }
.product-popular-badge { position: absolute; top: 0; right: 0; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-size: 0.7rem; font-weight: 700; padding: 0.3rem 0.85rem; border-radius: 0 var(--radius) 0 var(--radius); }
.product-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
.product-price { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.25rem; }
.product-rate { font-size: 0.8rem; color: var(--text-2); margin-bottom: 1.5rem; }
.product-returns { background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.product-return-item { display: flex; justify-content: space-between; font-size: 0.875rem; }
.product-features { list-style: none; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.product-features li { font-size: 0.8rem; color: var(--text-2); display: flex; gap: 0.4rem; }
.steps-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
.step-card { text-align: center; padding: 2rem; }
.step-number { font-family: var(--mono); font-size: 3rem; font-weight: 800; color: var(--border-bright); line-height: 1; margin-bottom: 0.75rem; }
.step-icon { font-size: 2rem; margin-bottom: 1rem; }
.step-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
.step-desc { font-size: 0.875rem; color: var(--text-2); line-height: 1.6; }
.testimonials-wrapper { overflow: hidden; padding: 1rem 0; }
.testimonials-track { display: flex; gap: 1.5rem; width: max-content; }
.testimonial-card { padding: 1.5rem; width: 340px; flex-shrink: 0; }
.testimonial-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.testimonial-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
.testimonial-name { font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 0.35rem; }
.testimonial-location { font-size: 0.75rem; color: var(--text-2); margin-top: 0.1rem; }
.testimonial-stars { font-size: 0.75rem; margin-left: auto; }
.testimonial-text { font-size: 0.875rem; color: var(--text-2); line-height: 1.65; font-style: italic; }
.verified-badge { background: var(--accent); color: white; border-radius: 50%; width: 14px; height: 14px; font-size: 0.55rem; display: inline-flex; align-items: center; justify-content: center; font-style: normal; }
.cta-section { position: relative; text-align: center; padding: 6rem 2rem; overflow: hidden; }
.cta-content { position: relative; z-index: 1; }
.cta-title { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1rem; }
.cta-sub { color: var(--text-2); max-width: 500px; margin: 0 auto 2rem; line-height: 1.7; }
.cta-trust { display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-2); flex-wrap: wrap; }
.footer { background: var(--bg-2); border-top: 1px solid var(--border); padding: 2.5rem 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.footer-text { font-size: 0.8rem; color: var(--text-3); max-width: 500px; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-size: 0.8rem; color: var(--text-2); }

/* ============================================================
   AUTH PAGE
   ============================================================ */
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 2rem; }
.auth-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.auth-container { position: relative; z-index: 1; width: 100%; max-width: 420px; }
.auth-brand { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
.auth-card { padding: 2rem; }
.auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: 0.25rem; }
.auth-tab { flex: 1; padding: 0.6rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; color: var(--text-2); transition: all 0.2s; cursor: pointer; }
.auth-tab.active { background: var(--primary); color: white; }
.auth-method-toggle { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.method-btn { flex: 1; padding: 0.6rem; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; color: var(--text-2); border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; }
.method-btn.active { border-color: var(--primary); color: var(--primary-light); background: rgba(99,102,241,0.1); }
.auth-divider { text-align: center; margin: 1.25rem 0 0.75rem; color: var(--text-3); font-size: 0.75rem; }
.auth-trust { display: flex; justify-content: center; gap: 1.5rem; font-size: 0.75rem; color: var(--text-3); }
.auth-back { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text-2); }
.otp-sent-msg { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: var(--radius-sm); padding: 0.75rem; font-size: 0.8rem; color: var(--text-2); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.otp-sent-msg span:first-child { color: var(--success); font-weight: 700; }
.otp-resend { text-align: center; margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-2); }
.link-btn { background: none; color: var(--primary-light); font-size: inherit; font-weight: 600; cursor: pointer; text-decoration: underline; border: none; }

/* ============================================================
   DASHBOARD LAYOUT
   ============================================================ */

// ============================================================
// AUTH MODULE
// ============================================================
const Auth = {
  currentUser: null,
  currentProfile: null,

  async init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      this.currentUser = session.user;
      await this.loadProfile();
    }
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        this.currentUser = session.user;
        await this.loadProfile();
      } else {
        this.currentUser = null;
        this.currentProfile = null;
      }
      Router.handleRoute();
    });
  },

  async loadProfile() {
    if (!this.currentUser) return null;
    const { data, error } = await supabaseClient.from('users').select('*').eq('id', this.currentUser.id).single();
    if (!error && data) this.currentProfile = data;
    return data;
  },

  async signUpEmail(email, password, fullName) {
    const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
    return { data, error };
  },

  async signInEmail(email, password) {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    return { data, error };
  },

  async sendOTP(phone) {
    const { data, error } = await supabaseClient.auth.signInWithOtp({ phone: phone.startsWith('+') ? phone : `+91${phone}` });
    return { data, error };
  },

  async verifyOTP(phone, token) {
    const { data, error } = await supabaseClient.auth.verifyOtp({ phone: phone.startsWith('+') ? phone : `+91${phone}`, token, type: 'sms' });
    return { data, error };
  },

  async signOut() {
    await supabaseClient.auth.signOut();
    this.currentUser = null;
    this.currentProfile = null;
    Router.navigate('landing');
  },

  isLoggedIn() { return !!this.currentUser; },
  isAdmin() { return this.currentProfile?.role === 'admin'; },
};

// ============================================================
// ROUTER MODULE
// ============================================================
const Router = {
  routes: { landing: 'renderLanding', login: 'renderLogin', dashboard: 'renderDashboard', products: 'renderProducts', cart: 'renderCart', wallet: 'renderWallet', orders: 'renderOrders', withdrawals: 'renderWithdrawals', profile: 'renderProfile', admin: 'renderAdmin' },
  protectedRoutes: ['dashboard','cart','wallet','orders','withdrawals','profile','admin'],
  adminRoutes: ['admin'],

  navigate(route) {
    window.location.hash = route;
    this.handleRoute();
  },

  handleRoute() {
    const hash = window.location.hash.replace('#', '') || 'landing';
    const route = hash.split('?')[0];
    if (this.protectedRoutes.includes(route) && !Auth.isLoggedIn()) { this.navigate('login'); return; }
    if (this.adminRoutes.includes(route) && !Auth.isAdmin()) { this.navigate('dashboard'); Toast.show('Access denied. Admin only.', 'error'); return; }
    const renderFn = this.routes[route];
    if (renderFn && window[renderFn]) window[renderFn]();
    else window.renderLanding?.();
    this.updateNav(route);
  },

  updateNav(route) {
    document.querySelectorAll('[data-route]').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });
  }
};

const Toast = {
  show(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, duration);
  }
};

const Utils = {
  formatCurrency(amount) { return `₹${parseFloat(amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; },
  formatDate(dateStr) { if (!dateStr) return 'N/A'; return new Date(dateStr).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); },
  formatDateTime(dateStr) { if (!dateStr) return 'N/A'; return new Date(dateStr).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); },
  timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const minutes = Math.floor(diff / 60000);
    if (minutes < 1) return 'just now';
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  },
  countdown(targetDate) {
    const diff = new Date(targetDate).getTime() - Date.now();
    if (diff <= 0) return { hours: 0, minutes: 0, seconds: 0, total: 0 };
    return { hours: Math.floor(diff / 3600000), minutes: Math.floor((diff % 3600000) / 60000), seconds: Math.floor((diff % 60000) / 1000), total: diff };
  },
  statusBadge(status) {
    const map = { pending_payment: ['⏳','badge-warning','Pending Payment'], payment_verifying: ['🔄','badge-info','Verifying'], active: ['✅','badge-success','Active'], failed: ['❌','badge-danger','Failed'], completed: ['🏆','badge-purple','Completed'], pending: ['⏳','badge-warning','Pending'], approved: ['✅','badge-success','Approved'], rejected: ['❌','badge-danger','Rejected'], processed: ['💸','badge-purple','Processed'] };
    const [icon, cls, label] = map[status] || ['●','badge-info', status || 'Unknown'];
    return `<span class="badge ${cls}">${icon} ${label}</span>`;
  },
  parseFeatures(features) { try { return typeof features === 'string' ? JSON.parse(features) : features || []; } catch { return []; } }
};

const DB = {
  async getProducts() { const { data, error } = await supabaseClient.from('products').select('*').eq('is_active', true).order('price'); return { data: data || [], error }; },

  },
  async activateOrder(orderId, razorpayPaymentId) {
    const now = new Date();
    const nextCashback = new Date(now.getTime() + 24 * 60 * 60 * 1000);
    return supabaseClient.from('orders').update({ status: 'active', started_at: now.toISOString(), ends_at: new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString(), next_cashback_at: nextCashback.toISOString(), razorpay_payment_id: razorpayPaymentId, updated_at: now.toISOString() }).eq('id', orderId);
  },
  async getOrders() { const { data, error } = await supabaseClient.from('orders').select('*, products(name, image_url)').eq('user_id', Auth.currentUser.id).order('created_at', { ascending: false }); return { data: data || [], error }; },
  async getAllOrders() { const { data, error } = await supabaseClient.from('orders').select('*, users(full_name, email), products(name)').order('created_at', { ascending: false }).limit(100); return { data: data || [], error }; },
  async getCashbackLogs(orderId) { const { data } = await supabaseClient.from('cashback_logs').select('*').eq('order_id', orderId).order('day_number'); return data || []; },
  async getWalletTransactions(limit = 20) { const { data } = await supabaseClient.from('wallet_transactions').select('*').eq('user_id', Auth.currentUser.id).order('created_at', { ascending: false }).limit(limit); return data || []; },
  async creditWallet(amount, type, description, refId = null, refType = null) { const { data, error } = await supabaseClient.rpc('credit_wallet', { p_user_id: Auth.currentUser.id, p_amount: amount, p_type: type, p_description: description, p_reference_id: refId, p_reference_type: refType }); return { data, error }; },
  async debitWallet(amount, type, description, refId = null, refType = null) { const { data, error } = await supabaseClient.rpc('debit_wallet', { p_user_id: Auth.currentUser.id, p_amount: amount, p_type: type, p_description: description, p_reference_id: refId, p_reference_type: refType }); return { data, error }; },
  async requestWithdrawal(amount, upiId) {
    const result = await this.debitWallet(amount, 'withdrawal', `Withdrawal request of ₹${amount}`);
    if (result.error || !result.data?.success) return { error: result.error || { message: result.data?.error || 'Wallet debit failed' } };

  async getAllWithdrawals() { const { data } = await supabaseClient.from('withdrawals').select('*, users(full_name, email)').order('created_at', { ascending: false }); return data || []; },
  async updateWithdrawal(id, status, adminNote = '') { return supabaseClient.from('withdrawals').update({ status, admin_note: adminNote, processed_at: new Date().toISOString() }).eq('id', id); },
  async getAllUsers() { const { data } = await supabaseClient.from('users').select('*').order('created_at', { ascending: false }); return data || []; },
  async getTestimonials() { const { data } = await supabaseClient.from('testimonials').select('*').eq('is_active', true); return data || []; },

    if (t.id) { const { id, ...rest } = t; return supabaseClient.from('testimonials').update(rest).eq('id', id); }
    return supabaseClient.from('testimonials').insert(t);
  },
  async updateProfile(updates) { const { data, error } = await supabaseClient.from('users').update({ ...updates, updated_at: new Date().toISOString() }).eq('id', Auth.currentUser.id).select().single(); if (!error && data) Auth.currentProfile = data; return { data, error }; },
  async getAnalytics() {
    const [users, orders, withdrawals, transactions] = await Promise.all([
      supabaseClient.from('users').select('id, created_at, total_invested, total_cashback_earned', { count: 'exact' }),
      supabaseClient.from('orders').select('id, status, amount, cashback_earned', { count: 'exact' }),
      supabaseClient.from('withdrawals').select('id, status, amount', { count: 'exact' }),
      supabaseClient.from('wallet_transactions').select('type, amount').eq('type', 'cashback'),
    ]);
    return {

      totalOrders: orders.count || 0,

window.switchAuthTab = function(tab) {

  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
};
window.switchAuthMethod = function(method) {
  document.getElementById('method-email').classList.toggle('active', method==='email');
  document.getElementById('method-phone').classList.toggle('active', method==='phone');
  document.getElementById('email-forms').style.display = method==='email' ? 'block' : 'none';
  document.getElementById('phone-forms').style.display = method==='phone' ? 'block' : 'none';
};
window.handleEmailLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { Toast.show('Please fill all fields', 'warning'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await Auth.signInEmail(email, password);
  if (error) { Toast.show(error.message, 'error'); btn.disabled = false; btn.innerHTML = 'Sign In <span class="btn-arrow">→</span>'; }
  else { Toast.show('Welcome back! 🎉', 'success'); Router.navigate('dashboard'); }
};
window.handleEmailRegister = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) { Toast.show('Please fill all fields', 'warning'); return; }
  if (password.length < 8) { Toast.show('Password must be at least 8 characters', 'warning'); return; }
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { error } = await Auth.signUpEmail(email, password, name);
  if (error) { Toast.show(error.message, 'error'); btn.disabled = false; btn.innerHTML = 'Create Account <span class="btn-arrow">→</span>'; }
  else { Toast.show('Account created! Check your email to verify. 🎉', 'success'); switchAuthTab('login'); }
};
let otpPhone = '';
window.handleSendOTP = async function() {
  const phone = document.getElementById('phone-number').value.trim();
  if (!/^\d{10}$/.test(phone)) { Toast.show('Enter a valid 10-digit phone number', 'warning'); return; }
  otpPhone = phone;
  const btn = document.getElementById('otp-send-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  const { error } = await Auth.sendOTP(phone);
  if (error) { Toast.show(error.message, 'error'); btn.disabled = false; btn.innerHTML = 'Send OTP <span class="btn-arrow">→</span>'; return; }
  document.getElementById('phone-input-step').style.display = 'none';
  document.getElementById('otp-verify-step').style.display = 'block';
  document.getElementById('otp-phone-display').textContent = `+91 ${phone}`;
  Toast.show('OTP sent successfully!', 'success');
  let seconds = 30;
  const timer = document.getElementById('otp-countdown');
  ActiveTimers['otp'] = setInterval(() => {
    seconds--;
    if (timer) timer.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(ActiveTimers['otp']);
      const rt = document.getElementById('resend-timer'); if (rt) rt.style.display = 'none';
      const rb = document.getElementById('resend-btn'); if (rb) rb.style.display = 'inline';
    }
  }, 1000);
};
window.handleVerifyOTP = async function() {
  const otp = document.getElementById('otp-code').value.trim();
  if (!otp || otp.length < 6) { Toast.show('Enter the 6-digit OTP', 'warning'); return; }
  const btn = document.getElementById('otp-verify-btn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  const { error } = await Auth.verifyOTP(otpPhone, otp);
  if (error) { Toast.show(error.message, 'error'); btn.disabled = false; btn.innerHTML = 'Verify & Continue <span class="btn-arrow">→</span>'; }
  else { Toast.show('Verified! Welcome to CashX 🎉', 'success'); Router.navigate('dashboard'); }
};

function startOrderTimer(orderId, nextCashbackAt) {
  const update = () => {
    const el = document.getElementById(`timer-val-${orderId}`);
    if (!el) { clearInterval(ActiveTimers[`timer-${orderId}`]); return; }
    const { hours, minutes, seconds, total } = Utils.countdown(nextCashbackAt);
    if (total <= 0) { el.textContent = 'Processing...'; el.style.color = '#22c55e'; return; }
    el.textContent = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
  };
  update();
  ActiveTimers[`timer-${orderId}`] = setInterval(update, 1000);
}

  const offset = circumference - (progress / 100) * circumference;
  const totalCashback = order.cashback_per_day * order.duration_days;

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';

                <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient></defs>

              <div class="info-row"><span>Earned So Far</span><strong class="text-success">${Utils.formatCurrency(order.cashback_earned)}</strong></div>

            </div>
          </div>
          <div>
            ${order.status === 'active' && order.next_cashback_at ? `
            <div class="countdown-container glass-card-inner">
              <div class="countdown-label">⏰ Next Cashback In</div>
              <div class="countdown-display">
                <div class="countdown-unit"><div class="countdown-val" id="m-hours">00</div><div class="countdown-unit-label">Hours</div></div>
                <div class="countdown-colon">:</div>
                <div class="countdown-unit"><div class="countdown-val" id="m-mins">00</div><div class="countdown-unit-label">Mins</div></div>
                <div class="countdown-colon">:</div>

window.processPayment = async function(productId) {
  let products = [];
  try { products = (await DB.getProducts()).data; } catch(e) {}
  const product = products.find(p => p.id === productId);
  if (!product) return;
  const btn = document.getElementById('pay-btn');
  btn.disabled = true; btn.textContent = 'Processing...';
  const pm = document.querySelector('input[name="pm"]:checked')?.value || 'razorpay';
  const { data: order, error: orderError } = await DB.createOrder(product, pm);
  if (orderError || !order) { Toast.show('Failed to create order. Please configure Supabase.', 'error'); btn.disabled = false; btn.textContent = 'Pay'; return; }
  if (pm === 'wallet') {
    const balance = Auth.currentProfile?.wallet_balance || 0;
    if (balance < product.price) { Toast.show(`Insufficient wallet balance. Need ${Utils.formatCurrency(product.price)}.`, 'error'); btn.disabled = false; btn.textContent = 'Pay'; return; }
    const debit = await DB.debitWallet(product.price, 'debit', `Purchase: ${product.name}`, order.id, 'order');
    if (debit.error || !debit.data?.success) { Toast.show('Wallet debit failed', 'error'); btn.disabled = false; btn.textContent = 'Pay'; return; }
    await DB.activateOrder(order.id, 'wallet_payment');
    await Auth.loadProfile();
    document.getElementById('payment-modal')?.remove();
    Toast.show('Plan activated! Daily cashback starts in 24 hours 🎉', 'success');
    Router.navigate('dashboard'); return;
  }
  if (typeof Razorpay !== 'undefined') {
    const options = { key: APP_CONFIG.razorpayKeyId, amount: product.price * 100, currency: 'INR', name: 'CashX', description: product.name, order_id: order.razorpay_order_id, handler: async (response) => { await DB.activateOrder(order.id, response.razorpay_payment_id); await Auth.loadProfile(); document.getElementById('payment-modal')?.remove(); Toast.show('Payment successful! Plan activated 🎉', 'success'); Router.navigate('dashboard'); }, prefill: { email: Auth.currentUser?.email, contact: Auth.currentProfile?.phone }, theme: { color: '#6366f1' } };
    new Razorpay(options).open();
  } else {
    await new Promise(r => setTimeout(r, 1500));
    await DB.activateOrder(order.id, 'demo_payment_' + Date.now());
    await Auth.loadProfile();
    document.getElementById('payment-modal')?.remove();
    Toast.show('Plan activated! (Demo Mode) Daily cashback starts in 24 hours 🎉', 'success');
    Router.navigate('dashboard');
  }
};

              ? `<div class="empty-state glass-card"><div class="empty-icon">📋</div><h3>No orders yet</h3><p>Your purchase history will appear here</p><button class="btn btn-primary" onclick="Router.navigate('products')">Browse Products</button></div>`
              : orders.map(o => renderFullOrderCard(o)).join('')}
          </div>
        </div>
      </div>
      ${renderMobileNav('orders')}
    </div>
  `;
  window._allOrders = orders;
  orders.filter(o => o.status === 'active').forEach(o => { if (o.next_cashback_at) startOrderTimer(o.id, o.next_cashback_at); });
};
window.filterOrders = function(status) {
  const filtered = status === 'all' ? window._allOrders : window._allOrders.filter(o => o.status === status);
  document.getElementById('orders-container').innerHTML = filtered.length ? filtered.map(o => renderFullOrderCard(o)).join('') : '<p class="empty-text">No orders found</p>';
  filtered.filter(o => o.status === 'active').forEach(o => { if (o.next_cashback_at) startOrderTimer(o.id, o.next_cashback_at); });
};
function renderFullOrderCard(order) {
  const snap = order.product_snapshot || {};
  const progress = order.duration_days > 0 ? ((order.cashback_days_credited || 0) / order.duration_days) * 100 : 0;
  return `
  <div class="order-full-card glass-card animate-in" onclick="openOrderDetail('${order.id}')">
    <div class="ofc-header">
      <div><div class="ofc-name">${snap.name || order.products?.name || 'Investment Plan'}</div><div class="ofc-date">${Utils.formatDate(order.created_at)}</div></div>
      <div>${Utils.statusBadge(order.status)}<div class="ofc-amount">${Utils.formatCurrency(order.amount)}</div></div>
    </div>
    <div class="ofc-stats">
      <div class="ofc-stat"><span>Daily</span><strong class="text-success">+${Utils.formatCurrency(order.cashback_per_day)}</strong></div>
      <div class="ofc-stat"><span>Earned</span><strong>${Utils.formatCurrency(order.cashback_earned)}</strong></div>
      <div class="ofc-stat"><span>Days</span><strong>${order.cashback_days_credited || 0}/${order.duration_days}</strong></div>
      ${order.status === 'active' ? `<div class="ofc-stat"><span>Next</span><strong id="timer-val-${order.id}" class="text-success">...</strong></div>` : ''}
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
    <div class="ofc-click-hint">Click to view details →</div>
  </div>`;
}

window.showWithdrawalModal = function(balance, savedUpi) {
  if (balance < 150) { Toast.show('Minimum withdrawal is ₹150', 'warning'); return; }
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'withdrawal-modal';
  modal.innerHTML = `
    <div class="modal glass-card">
      <div class="modal-header"><h2 class="modal-title">Request Withdrawal</h2><button class="modal-close" onclick="document.getElementById('withdrawal-modal').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Amount (Min ₹150, Max ${Utils.formatCurrency(balance)})</label><input type="number" class="form-input" id="wd-amount" placeholder="Enter amount" min="150" max="${balance}" step="1"></div>
        <div class="form-group"><label class="form-label">UPI ID</label><input type="text" class="form-input" id="wd-upi" placeholder="yourname@upi" value="${savedUpi}"></div>
        <div class="wd-note glass-card-inner">⚡ Withdrawals processed within 2-4 hours via RazorpayX</div>
        <button class="btn btn-primary w-full btn-lg" onclick="submitWithdrawal()">Confirm Withdrawal</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
};
window.submitWithdrawal = async function() {
  const amount = parseFloat(document.getElementById('wd-amount').value);
  const upi = document.getElementById('wd-upi').value.trim();
  if (!amount || amount < 150) { Toast.show('Minimum withdrawal is ₹150', 'warning'); return; }
  if (!upi) { Toast.show('Enter your UPI ID', 'warning'); return; }
  if (amount > (Auth.currentProfile?.wallet_balance || 0)) { Toast.show('Insufficient balance', 'error'); return; }
  const { error } = await DB.requestWithdrawal(amount, upi);
  if (error) { Toast.show(error.message || 'Withdrawal failed', 'error'); return; }
  await DB.updateProfile({ upi_id: upi });
  document.getElementById('withdrawal-modal')?.remove();
  Toast.show('Withdrawal request submitted! Processing in 2-4 hours 🎉', 'success');
  await Auth.loadProfile();
  renderWithdrawals();
};

window.switchAdminTab = async function(tab, btn) {
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  const container = document.getElementById('admin-content');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  switch (tab) {
    case 'analytics': await renderAdminAnalytics(container); break;
    case 'products': await renderAdminProducts(container); break;
    case 'users': await renderAdminUsers(container); break;
    case 'orders': await renderAdminOrders(container); break;
    case 'withdrawals': await renderAdminWithdrawals(container); break;
    case 'testimonials': await renderAdminTestimonials(container); break;
  }
};

    </div>
  `;
}

window.showTestimonialModal = function(t = null) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'testimonial-modal';
  modal.innerHTML = `
    <div class="modal glass-card">
      <div class="modal-header"><h2 class="modal-title">${t ? 'Edit' : 'Add'} Testimonial</h2><button class="modal-close" onclick="document.getElementById('testimonial-modal').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="t-name" value="${t?.user_name || ''}"></div>
        <div class="form-group"><label class="form-label">Location</label><input type="text" class="form-input" id="t-location" value="${t?.user_location || ''}"></div>
        <div class="form-group"><label class="form-label">Avatar URL</label><input type="url" class="form-input" id="t-avatar" value="${t?.user_avatar || ''}"></div>
        <div class="form-group"><label class="form-label">Rating (1-5)</label><input type="number" class="form-input" id="t-rating" value="${t?.rating || 5}" min="1" max="5"></div>
        <div class="form-group"><label class="form-label">Review Text</label><textarea class="form-input" id="t-content" rows="4">${t?.content || ''}</textarea></div>
        <div class="form-group"><label class="form-check"><input type="checkbox" id="t-verified" ${t?.is_verified ? 'checked' : ''}><span>Mark as Verified</span></label></div>
        <button class="btn btn-primary w-full btn-lg" onclick="saveTestimonial('${t?.id || ''}')">Save Review</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
};

window.saveTestimonial = async function(id) {
  const t = { id: id || undefined, user_name: document.getElementById('t-name').value.trim(), user_location: document.getElementById('t-location').value.trim(), user_avatar: document.getElementById('t-avatar').value.trim(), rating: parseInt(document.getElementById('t-rating').value), content: document.getElementById('t-content').value.trim(), is_verified: document.getElementById('t-verified').checked, is_active: true };
  if (!t.user_name || !t.content) { Toast.show('Name and review required', 'warning'); return; }
  const { error } = await DB.saveTestimonial(t);
  if (error) { Toast.show('Failed: ' + error.message, 'error'); return; }
  document.getElementById('testimonial-modal').remove();
  Toast.show('Testimonial saved!', 'success');
  switchAdminTab('testimonials', document.querySelectorAll('.admin-tab')[5]);
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('hashchange', () => Router.handleRoute());
window.addEventListener('load', async () => {
  await Auth.init();
  Router.handleRoute();
});
</script>
</body>
